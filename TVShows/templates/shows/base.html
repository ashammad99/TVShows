<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TV Shows{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border: 2px solid #333;
            min-height: 400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin: 0;
        }

        h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }

        .go-back {
            color: #0066cc;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .go-back:hover {
            text-decoration: underline;
        }

        .add-show-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
        }

        .add-show-link:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button,
        .btn {
            padding: 10px 20px;
            border: 1px solid #333;
            background-color: white;
            color: #333;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover,
        .btn:hover {
            background-color: #f0f0f0;
        }

        .btn-primary {
            background-color: #333;
            color: white;
            border-color: #333;
        }

        .btn-primary:hover {
            background-color: #555;
        }

        .btn-danger {
            color: #d9534f;
            border-color: #d9534f;
        }

        .btn-danger:hover {
            background-color: #f8d7da;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        td {
            border: 1px solid #ddd;
            padding: 12px;
            font-size: 14px;
        }

        tr:nth-child(odd) {
            background-color: #fafafa;
        }

        tr:hover {
            background-color: #f0f0f0;
        }

        .action-links {
            display: flex;
            gap: 10px;
        }

        .action-links a {
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
        }

        .action-links a:hover {
            text-decoration: underline;
        }

        .show-details {
            margin-top: 20px;
        }

        .show-details p {
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 14px;
        }

        .show-details strong {
            display: inline-block;
            width: 150px;
            color: #333;
            font-weight: bold;
        }

        .meta-info {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .error-message {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        ul {
            margin-left: 20px;
        }

        li {
            margin-bottom: 5px;
            font-size: 13px;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
        {% for message in messages %}
            <div class="success-message">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
